name: untitled
description: "Quran Madrasa - A Quran memorization tracking system."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependency_overrides:
  analyzer: ^7.6.0
  analyzer_plugin: ^0.14.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase Core
  firebase_core: ^3.0.0

  # Firebase Authentication
  firebase_auth: ^5.0.0

  # Firestore Database
  cloud_firestore: ^5.0.0

  # Cloud Messaging (FCM)
  firebase_messaging: ^15.0.0

  # Cloud Storage
  firebase_storage: ^12.0.0

  # Crashlytics
  firebase_crashlytics: ^4.0.0

  # Realtime Database (optional, already present)
  firebase_database: ^11.0.0

  # Riverpod State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^13.0.0

  # Utilities
  intl: ^0.18.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/quran_metadata.json
