name: untitled
description: "Quran Madrasa - A Quran memorization tracking system."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase Core
  firebase_core: ^3.0.0

  # Firebase Authentication
  firebase_auth: ^5.0.0

  # Firestore Database
  cloud_firestore: ^5.0.0

  # Cloud Messaging (FCM)
  firebase_messaging: ^15.0.0

  # Cloud Storage
  firebase_storage: ^12.0.0

  # Crashlytics
  firebase_crashlytics: ^4.0.0

  # Realtime Database (optional, already present)
  firebase_database: ^11.0.0

  # Riverpod State Management (upgraded for analyzer 9+ compatibility)
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^13.0.0

  # Utilities
  intl: ^0.18.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.11.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.1
  riverpod_lint: ^3.0.0

  # Testing
  fake_cloud_firestore: ^3.0.0
  firebase_auth_mocks: ^0.14.2
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/quran_metadata.json
